<div class="app-container">
  <header class="app-header">
    <div class="header-left">
      <h1>SharePoint File Browser</h1>
    </div>
    <nav class="header-nav">
      <button
        class="nav-tab"
        [class.active]="activeTab === 'browser'"
        (click)="switchTab('browser')"
      >
        📂 Browser
      </button>
      <button
        class="nav-tab"
        [class.active]="activeTab === 'config'"
        (click)="switchTab('config')"
      >
        ⚙️ Configuration
      </button>
    </nav>
    <div class="header-right">
      <span class="status-badge" [class.configured]="configService.isConfigured()">
        {{ configService.isConfigured() ? '● Connected' : '○ Not Configured' }}
      </span>
    </div>
  </header>

  <main class="app-main">
    <app-file-browser *ngIf="activeTab === 'browser'"></app-file-browser>
    <app-config-form *ngIf="activeTab === 'config'"></app-config-form>
  </main>

  <footer class="app-footer">
    <p>SharePoint Plugin Frontend — Connected to your .NET backend API</p>
  </footer>
</div>
